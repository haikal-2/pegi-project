<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <link rel="icon" type="image/png" href="/192.png?v=2" />
    <link rel="apple-touch-icon" href="/apple.png?v=2" /> 
    
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pegi.id</title>
    
    <script 
      type="text/javascript"
      src="https://app.sandbox.midtrans.com/snap/snap.js"
      data-client-key="Mid-client-Ccd_n6mieDntixKx">
    </script>

    <style>
      body {
        margin: 0;
        padding: 0;
      }
      
      #loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #ffffff; /* Warna background loading screen */
        z-index: 9999;
      }

      .spinner-container {
        position: relative;
        width: 80px;
        height: 80px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Animasi garis muter di luar logo */
      .spinner {
        position: absolute;
        width: 100%;
        height: 100%;
        border: 4px solid #f3f3f3; /* Warna garis background */
        border-top-color: #7b3fe4; /* Warna garis yang muter (Gua samain ungu kayak PWA lu) */
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      /* Logo di tengah spinner */
      .spinner-logo {
        width: 45px; /* Sesuaikan ukuran logo di tengah */
        height: 45px;
        border-radius: 50%; /* Bikin logonya bulat kalau misal bentuk aslinya kotak */
        z-index: 10;
        object-fit: contain;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      
      <div id="loading-screen">
        <div class="spinner-container">
          <div class="spinner"></div>
          <img src="/apple.png" alt="Loading Logo" class="spinner-logo" />
        </div>
      </div>
      
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
